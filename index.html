<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>주식 매매 일지</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar" aria-label="주요 메뉴">
        <a class="brand" href="#dashboard" aria-label="주식 매매 일지 홈">
          <span class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24">
              <path d="M4 17.5h16" />
              <path d="M6.5 15V10" />
              <path d="M11 15V7" />
              <path d="M15.5 15v-4" />
              <path d="m6.5 10 4.5-3 4.5 4 4-6" />
              <path d="M17.5 5H20v2.5" />
            </svg>
          </span>
          <span>주식 매매 일지</span>
        </a>
        <nav class="nav-list" id="navList"></nav>
        <button class="logout" type="button">
          <span data-icon="logout"></span>
          <span>로그아웃</span>
        </button>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow" id="pageEyebrow">Trading Journal</p>
            <h1 id="pageTitle">대시보드</h1>
            <p class="page-description" id="pageDescription"></p>
          </div>
          <div class="topbar-actions">
            <div id="pageActions" class="page-actions"></div>
          </div>
        </header>

        <section id="app" class="page-content" aria-live="polite"></section>
      </main>
    </div>

    <div id="modalRoot"></div>

    <script defer src="src/js/core/icons.js"></script>
    <script defer src="src/js/core/data.js"></script>
    <script defer src="src/js/core/ui.js"></script>
    <script defer src="src/js/core/charts.js"></script>
    <script defer src="src/js/core/tables.js"></script>
    <script defer src="src/js/pages/dashboard.js"></script>
    <script defer src="src/js/pages/journal.js"></script>
    <script defer src="src/js/pages/journal-write.js"></script>
    <script defer src="src/js/pages/stock.js"></script>
    <script defer src="src/js/pages/performance.js"></script>
    <script defer src="src/js/pages/assets.js"></script>
    <script defer src="src/js/pages/memo.js"></script>
    <script defer src="src/js/pages/calendar.js"></script>
    <script defer src="src/js/pages/settings.js"></script>
    <script defer src="src/js/app.js"></script>
  </body>
</html>
