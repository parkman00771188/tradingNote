name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  group: cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify Cloudflare credentials
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::error title=Missing CLOUDFLARE_API_TOKEN::GitHub repository secret CLOUDFLARE_API_TOKEN is required for Cloudflare Pages deployment."
            echo "Add it in GitHub repository Settings > Secrets and variables > Actions > Repository secrets."
            exit 1
          fi

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: 29a0cfebc95500552ba6a11bc5585130
        run: npx wrangler@4 pages deploy . --project-name=tradingnote --branch=main --commit-hash=${{ github.sha }}
